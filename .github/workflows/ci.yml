name: CI

on:
  pull_request:
    branches: [main, stage]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Application/Frigorino.Web/ClientApp/package-lock.json

      - name: Install frontend dependencies
        working-directory: Application/Frigorino.Web/ClientApp
        run: npm ci --ignore-scripts

      - name: Lint
        working-directory: Application/Frigorino.Web/ClientApp
        run: npm run lint

      - name: Type-check
        working-directory: Application/Frigorino.Web/ClientApp
        run: npm run tsc

      - name: Build
        working-directory: Application/Frigorino.Web/ClientApp
        run: npm run build

      - name: Upload SPA build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-app-build
          path: Application/Frigorino.Web/ClientApp/build
          if-no-files-found: error
          retention-days: 1

  unit-tests:
    name: Unit & architecture tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Application/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore (locked)
        run: dotnet restore Application/Frigorino.Test/Frigorino.Test.csproj --locked-mode

      - name: Run Frigorino.Test
        run: >
          dotnet test Application/Frigorino.Test/Frigorino.Test.csproj
          --configuration Release
          --no-restore
          --logger "trx;LogFileName=unit-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: TestResults/*.trx
          if-no-files-found: ignore

  integration-tests:
    name: Integration tests (Reqnroll + Playwright + Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Application/**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore (locked)
        run: dotnet restore Application/Frigorino.IntegrationTests/Frigorino.IntegrationTests.csproj --locked-mode

      - name: Download SPA build artifact
        uses: actions/download-artifact@v4
        with:
          name: client-app-build
          path: Application/Frigorino.Web/ClientApp/build

      - name: Run Frigorino.IntegrationTests
        uses: nick-fields/retry@v3
        env:
          FRIGORINO_SKIP_SPA_BUILD: '1'
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: >
            dotnet test Application/Frigorino.IntegrationTests/Frigorino.IntegrationTests.csproj
            --configuration Release
            --no-restore
            --logger "trx;LogFileName=integration-tests.trx"
            --logger "console;verbosity=normal"
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: TestResults/*.trx
          if-no-files-found: ignore
